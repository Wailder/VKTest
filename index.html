<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WiTest</title>
    <script src="https://vk.com/js/api/openapi.js?169" type="text/javascript"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background: #f0f0f0; }
        .url-input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .load-btn { padding: 10px 20px; background: #4a76a8; color: white; border: none; border-radius: 5px; }
        iframe { width: 100%; height: 80vh; margin-top: 20px; border: 1px solid #ccc; background: white; }
    </style>
</head>
<body>
    <input type="text" id="urlInput" class="url-input" placeholder="https://youtube.com" value="https://youtube.com">
    <button onclick="loadUrl()" class="load-btn">Загрузить</button>
    <iframe id="contentFrame"></iframe>

    <script>
        function loadUrl() {
            let url = document.getElementById('urlInput').value;
            if (!url.startsWith('http')) url = 'https://' + url;
            document.getElementById('contentFrame').src = url;
        }
    </script>
</body>
</html>
